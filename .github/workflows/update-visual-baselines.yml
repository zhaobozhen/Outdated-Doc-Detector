name: Update Visual Baselines

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Generate macOS 26 visual baselines
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.5.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --no-install playwright install chromium

      - name: Show visual environment
        run: |
          sw_vers
          uname -m
          node --version
          npm --version
          npx --no-install playwright --version

      - name: Generate visual baseline candidates
        run: npm run test:e2e:update

      - name: Verify visual baseline candidates
        run: npm run test:e2e

      - name: Upload visual baseline candidates
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-macos-26-${{ github.sha }}
          path: e2e/extension.spec.ts-snapshots/
          if-no-files-found: error
          retention-days: 7
